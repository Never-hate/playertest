<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Proxy Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    
    <style>
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #f1f1f1; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; }
        button, select { padding: 10px 16px; cursor: pointer; background: #0056b3; color: white; border: none; border-radius: 6px; white-space: nowrap; }
        button:hover, select:hover { background: #004494; }
        .video-wrapper { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .toolbar { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .error { color: #ff6b6b; margin-bottom: 15px; padding: 10px; background: rgba(255,0,0,0.1); border-radius: 6px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Network Proxy Video Player</h2>
        
        <div class="input-group">
            <input type="text" id="streamUrl" placeholder="Enter remote .m3u8 or .mpd URL">
        </div>
        <div class="input-group">
            <input type="text" id="refererUrl" placeholder="Enter Referer URL (e.g., https://example.com/)">
            <button onclick="loadStream()">Load Stream</button>
        </div>
        
        <div id="errorMsg" class="error"></div>
        
        <div class="video-wrapper">
            <video id="videoPlayer" controls></video>
        </div>
        
        <div class="toolbar">
            <select id="qualitySelect">
                <option value="-1">Auto Quality</option>
            </select>
            
            <select id="speedSelect" onchange="changeSpeed(this.value)">
                <option value="0.5">0.5x Speed</option>
                <option value="1" selected>1.0x Speed</option>
                <option value="1.5">1.5x Speed</option>
                <option value="2">2.0x Speed</option>
            </select>
            
            <button onclick="togglePiP()">Picture-in-Picture</button>
            <button onclick="toggleFullscreen()">Fullscreen</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
